<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PawCare - Mis Mascotas</title>
    <!-- CSS con sus carpetas originales -->
    <link rel="stylesheet" href="css/layout-common.css">
    <link rel="stylesheet" href="css/mascotas.css">
    <link rel="stylesheet" href="css/sidebar-common.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- SIDEBAR ADAPTADO AL USUARIO -->
        <aside class="sidebar" id="sidebar">
            <button class="sidebar-toggle" aria-label="Abrir/cerrar menú"><i class="fa-solid fa-bars"></i></button>
            <nav class="sidebar-nav">
                <a href="index.html" class="sidebar-link"><span class="sidebar-icon"><i class="fa-solid fa-house"></i></span><span class="sidebar-label">Inicio</span></a>
                <a href="usuarioservicios.html" class="sidebar-link"><span class="sidebar-icon"><i class="fa-solid fa-star"></i></span><span class="sidebar-label">Servicios</span></a>
                <a href="usuarioreservaciones.html" class="sidebar-link"><span class="sidebar-icon"><i class="fa-solid fa-calendar-days"></i></span><span class="sidebar-label">Reservas</span></a>
                <a href="usuariomascotas.html" class="sidebar-link active"><span class="sidebar-icon"><i class="fa-solid fa-paw"></i></span><span class="sidebar-label">Mascotas</span></a>
            </nav>
            <a href="perfilusuario.html" class="sidebar-admin">
                <span class="sidebar-icon"><img class="icono" src="img/usergenerall.png" alt=""></span>
                <span class="sidebar-label">Usuario</span>
            </a>
        </aside>
        <main class="main-content">
            <div class="glass-panel">
                <header class="content-header">
                    <h2>Mis Mascotas</h2>
                </header>
                <section id="view-grid" class="content-view">
                    <div class="pets-grid" id="pets-container"></div>
                </section>
                <section id="view-form" class="content-view hidden">
                    <div class="form-container">
                        <div class="image-upload-box">
                            <img id="preview-image" src="https://via.placeholder.com/150" alt="Mascota">
                        </div>
                        <div id="subview-data" class="sub-form-view">
                            <form id="pet-data-form">
                                <div class="form-section">
                                    <h3>Mascota</h3>
                                    <div class="input-group">
                                        <label>Nombre</label>
                                        <input type="text" id="form-nombre" disabled>
                                    </div>
                                    <div class="input-group">
                                        <label>Género</label>
                                        <input type="text" id="form-genero" disabled>
                                    </div>
                                    <div class="input-group">
                                        <label>Edad</label>
                                        <input type="text" id="form-edad" disabled>
                                    </div>
                                    <div class="input-group">
                                        <label>Raza</label>
                                        <input type="text" id="form-raza" disabled>
                                    </div>
                                </div>
                                <div class="form-section">
                                    <h3>Dueño</h3>
                                    <div class="input-group">
                                        <label>Nombre del dueño</label>
                                        <input type="text" id="form-dueno" disabled>
                                    </div>
                                    <div class="input-group">
                                        <label>Número telefónico</label>
                                        <input type="tel" id="form-telefono" disabled>
                                    </div>
                                </div>
                                <div class="form-actions">
                                    <button type="button" class="btn-cancel btn-back-grid">Volver al menú</button>
                                </div>
                            </form>
                        </div>
                        <div id="subview-cuidado" class="sub-form-view hidden">
                            <div class="cuidado-section">
                                <div class="cuidado-header">
                                    <h3>Indicaciones de cuidado:</h3>
                                </div>
                                <div class="textarea-container">
                                    <textarea id="form-indicaciones" disabled></textarea>
                                </div>
                            </div>
                            <div class="form-actions">
                                <button type="button" id="btn-volver-cuidado" class="btn-cancel">Volver</button>
                            </div>
                        </div>
                        <div class="side-action-buttons">
                            <button id="btn-toggle-data" class="btn-secondary hidden"><i class="fa-solid fa-arrow-left"></i> Ver Datos</button>
                            <button id="btn-toggle-cuidado" class="btn-secondary">Indicaciones de cuidado</button>
                            <button id="btn-open-prescripcion" class="btn-secondary">Prescripción médica</button>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>
    <div id="prescripcion-modal" class="modal-overlay hidden">
        <div class="modal-box prescripcion-box">
            <h3>PREINSCRIPCIÓN MÉDICA</h3>
            <form id="prescripcion-form">
                <div class="med-group">
                    <label>Nombre del medicamento:</label>
                    <input type="text" id="presc-nombre" disabled>
                </div>
                <div class="med-group">
                    <label>Vía de Administración:</label>
                    <div class="radio-options">
                        <label class="radio-card">
                            <input type="radio" name="via" value="Pastilla" disabled>
                            <span class="radio-circle"></span>
                            Pastilla
                        </label>
                        <label class="radio-card">
                            <input type="radio" name="via" value="Inyección" disabled>
                            <span class="radio-circle"></span>
                            Inyección
                        </label>
                        <label class="radio-card">
                            <input type="radio" name="via" value="Líquidos/Geles" disabled>
                            <span class="radio-circle"></span>
                            Líquidos/Geles
                        </label>
                        <label class="radio-card">
                            <input type="radio" name="via" value="Otro" id="radio-otro" disabled>
                            <span class="radio-circle"></span>
                            Otro:
                            <input type="text" id="presc-via-otro" disabled>
                        </label>
                    </div>
                </div>
                <div class="med-duration-container">
                    <div class="med-group inline">
                        <label>Duración:</label>
                        <div class="input-inline">
                            <span>Días:</span>
                            <input type="number" id="presc-dias" disabled>
                        </div>
                    </div>
                    <div class="med-group inline">
                        <label>Administrar Cada:</label>
                        <div class="input-inline">
                            <input type="number" id="presc-cada" disabled>
                            <span>Horas</span>
                        </div>
                    </div>
                </div>
                <div class="prescripcion-actions">
                    <button type="button" id="btn-cerrar-prescripcion" class="btn-cancel" style="background-color: var(--accent-blue-dark)">Cerrar</button>
                </div>
            </form>
        </div>
    </div>

<script src="js/config.js"></script>
    <script src="js/sidebar-common.js"></script>
    <script src="js/usuariomascotas.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PawCARE - Iniciar sesión</title>
  <link rel="stylesheet" href="css/login.css">
</head>
<body>

  <main class="login-card">
    <img src="img/logo-pawcare.png" alt="Logo PawCARE" class="logo">

    <h1 class="welcome-title">¡BIENVENIDO A PAWCARE!</h1>

    <div class="user-icon">
      <img src="img/usergenerall.png" alt="Usuario general" class="user-image">
    </div>

    <form id="loginForm" novalidate>
      <label for="username">Usuario</label>
      <input
        type="text"
        id="username"
        name="username"
        placeholder="Ingrese un nombre de usuario"
        autocomplete="username"
        required
      >

      <label for="password">Contraseña</label>
      <input
        type="password"
        id="password"
        name="password"
        placeholder="Ingrese una contraseña"
        autocomplete="current-password"
        required
      >

      <button type="submit" class="login-btn" id="loginBtn">LOG IN</button>
      <p class="auth-switch">¿Aún no tienes cuenta? <a href="registro.html">Crear cuenta</a></p>
    </form>
  </main>

  <div class="modal-overlay" id="successModal">
    <div class="modal-box">
      <div class="modal-icon icon-success">
        <img src="img/User check.png" alt="Check correcto" class="modal-image">
      </div>
      <h2>Inicio de Sesión Exitoso</h2>
      <a href="ganancias.html" class="modal-btn modal-btn-primary" id="enterAppBtn">Entrar a la aplicación</a>
    </div>
  </div>

  <div class="modal-overlay" id="errorModal">
    <div class="modal-box">
      <div class="modal-icon icon-error">
        <img src="img/User x.png" alt="Error" class="modal-image">
      </div>
      <h2>¡Ha ocurrido un error!</h2>
      <p>Asegurate de haber colocado los datos correctamente</p>
      <div class="modal-actions">
        <button type="button" class="modal-btn modal-btn-secondary" id="retryBtn">Reintentar</button>
        <a href="index.html" class="modal-btn modal-btn-primary" id="backBtn">Volver</a>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/login.js"></script>
</body>
</html>

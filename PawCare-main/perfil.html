<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil de Usuario</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/layout-common.css">
    <link rel="stylesheet" href="css/perfil.css">
    <link rel="stylesheet" href="css/sidebar-common.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <button class="sidebar-toggle" aria-label="Abrir/cerrar menú"><i class="fa-solid fa-bars"></i></button>
            <nav class="sidebar-nav">
                <a href="index.html" class="sidebar-link"><span class="sidebar-icon"><i class="fa-solid fa-house"></i></span><span class="sidebar-label">Inicio</span></a>
                <a href="servicios.html" class="sidebar-link"><span class="sidebar-icon"><i class="fa-solid fa-star"></i></span><span class="sidebar-label">Servicios</span></a>
                <a href="mascotas.html" class="sidebar-link"><span class="sidebar-icon"><i class="fa-solid fa-paw"></i></span><span class="sidebar-label">Mascotas</span></a>
                <a href="reservaciones.html" class="sidebar-link"><span class="sidebar-icon"><i class="fa-solid fa-calendar-days"></i></span><span class="sidebar-label">Reservas</span></a>
                <a href="ganancias.html" class="sidebar-link"><span class="sidebar-icon"><i class="fa-solid fa-credit-card"></i></span><span class="sidebar-label">Ganancias</span></a>
            </nav>
            <a href="perfil.html" class="sidebar-admin active">
                <span class="sidebar-icon"><img class="icono" src="img/usergenerall.png" alt=""></span>
                <span class="sidebar-label">Administrador</span>
            </a>
        </aside>

        <main class="main-content">
            <div class="glass-panel">
                <header class="profile-header">
                    <div class="avatar-container">
                        <img src="img/usergenerall.png" alt="Foto de perfil" class="profile-avatar">
                    </div>
                    <h2>Usuario</h2>
                    <div class="profile-meta">
                        <span>email.user@gmail.com</span>
                        <span>Tu País, México</span>
                    </div>
                </header>

                <section class="profile-card">
                    <form id="profile-form">
                        <div class="input-group">
                            <label for="nombre">Nombre</label>
                            <input type="text" id="nombre" value="Alejandro Muñoz" disabled required>
                        </div>
                
                <div class="input-group">
                    <label for="correo">Correo Electrónico</label>
                    <input type="email" id="correo" value="user@gmail.com" disabled required>
                </div>

                <div class="input-group">
                    <label for="nombre-usuario">Nombre de usuario</label>
                    <input type="text" id="nombre-usuario" value="ale_muñoz" disabled required>
                </div>

                <div class="input-group" id="pass-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" value="123456" disabled required>
                    <span class="error-text">Verifica los datos. Campos incompletos o inválidos</span>
                </div>

                <div class="input-group">
                    <label for="telefono">Teléfono</label>
                    <input type="tel" id="telefono" value="55 5555 5555" disabled required>
                </div>

                <div class="input-group">
                    <label for="direccion">Dirección</label>
                    <input type="text" id="direccion" value="Av. Siempre Viva" disabled required>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn btn-blue" id="btn-edit">Editar</button>
                    <button type="button" class="btn btn-red d-none" id="btn-cancel">Cancelar</button>
                    <button type="submit" class="btn btn-blue d-none" id="btn-save">Aplicar cambios</button>
                </div>
            </form>
        </section>
    </main>
    </div>

    <div class="modal-overlay d-none" id="modal-success">
        <div class="modal-box success">
            <div class="icon-circle"><i class="fa-solid fa-user-check status-icon"></i></div>
            <h3>CAMBIOS GUARDADOS</h3>
            <p>Tus datos se registraron correctamente</p>
        </div>
    </div> 

    <div class="modal-overlay d-none" id="modal-error">
        <div class="modal-box danger">
            <div class="icon-circle"><i class="fa-solid fa-user-xmark status-icon"></i></div>
            <h3>DATOS INVÁLIDOS</h3>
            <p>Verifica los datos. Campos incompletos o inválidos</p>
        </div>
    </div> 

    <script src="js/config.js"></script>
    <script src="js/sidebar-common.js"></script>
    <script src="js/perfil.js"></script>
</body>
</html>

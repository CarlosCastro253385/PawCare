<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Servicios - PawCARE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/servicios.css">
</head>
<body>
    <div class="app-container">
        <main class="main-content">
            <div class="glass-panel">
                
                <!-- VISTA 1: CATALOGO / GRID -->
                <div id="view-grid">
                    <div class="content-header">
                        <h2>Servicios</h2>
                        <button class="btn-primary" id="btn-agregar-servicio">+ Nuevo Servicio</button>
                    </div>
                    <div id="services-container" class="pets-grid">
                        <!-- Se llena dinámicamente -->
                    </div>
                </div>

                <!-- VISTA 2: FORMULARIO DETALLE / NUEVO -->
                <div id="view-form" class="hidden">
                    <div class="content-header">
                        <button class="btn-primary btn-back-grid"><i class="fa-solid fa-arrow-left"></i> Volver</button>
                        <h2>Detalle del Servicio</h2>
                        <div></div>
                    </div>

                    <div class="form-layout">
                        <!-- SUBIR IMAGEN -->
                        <div class="image-uploader" onclick="document.getElementById('form-foto-file').click();">
                            <img id="form-preview-img" src="img/default-service.png" alt="Servicio">
                            <input type="file" id="form-foto-file" accept="image/*" class="hidden">
                        </div>

                        <!-- CAMPOS DEL FORMULARIO -->
                        <div class="fields-card">
                            <i class="fa-solid fa-pen card-header-icon" id="btn-edit-data" title="Editar campos"></i>
                            <form id="servicio-data-form">
                                <div id="modalServicio" class="modal-overlay" style="display: none;">
    <div class="modal-box" style="width: 500px; text-align: left;">
        <h3 id="modalTitulo" style="margin-bottom: 15px; font-size: 20px;">Nuevo Servicio</h3>
        
        <form id="formServicio" style="display: flex; flex-direction: column; gap: 12px;">
            <div>
                <label style="font-size: 12px; font-weight: bold; color: #475569;">Nombre del Servicio:</label>
                <input type="text" id="nombreServicio" placeholder="Ej. Baño Completo" required style="width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #cbd5e1;">
            </div>

            <div>
                <label style="font-size: 12px; font-weight: bold; color: #475569;">Detalles / Títulos clave:</label>
                <input type="text" id="detallesServicio" placeholder="Ej. Incluye secado, corte de uñas" required style="width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #cbd5e1;">
            </div>

            <div>
                <label style="font-size: 12px; font-weight: bold; color: #475569;">Descripción:</label>
                <textarea id="descServicio" rows="2" placeholder="Descripción breve del servicio..." style="width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #cbd5e1; resize: none;"></textarea>
            </div>

            <!-- SECCIÓN DE PRECIOS POR TAMAÑO -->
            <div style="background: #f8fafc; padding: 10px; border-radius: 8px; border: 1px solid #e2e8f0;">
                <label style="font-size: 13px; font-weight: bold; color: #1e293b; display: block; margin-bottom: 8px;">Precios por Tamaño ($):</label>
                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;">
                    <div>
                        <span style="font-size: 10px; font-weight: bold; color: #64748b;">Raza Grande</span>
                        <input type="number" step="0.01" id="precioGrande" placeholder="0.00" required style="width: 100%; padding: 6px; border-radius: 4px; border: 1px solid #cbd5e1;">
                    </div>
                    <div>
                        <span style="font-size: 10px; font-weight: bold; color: #64748b;">Raza Mediana</span>
                        <input type="number" step="0.01" id="precioMediano" placeholder="0.00" required style="width: 100%; padding: 6px; border-radius: 4px; border: 1px solid #cbd5e1;">
                    </div>
                    <div>
                        <span style="font-size: 10px; font-weight: bold; color: #64748b;">Raza Chica</span>
                        <input type="number" step="0.01" id="precioChico" placeholder="0.00" required style="width: 100%; padding: 6px; border-radius: 4px; border: 1px solid #cbd5e1;">
                    </div>
                </div>
            </div>

            <div>
                <label style="font-size: 12px; font-weight: bold; color: #475569;">Imagen del servicio:</label>
                <input type="file" id="imagenServicio" accept="image/*" style="width: 100%; margin-top: 4px;">
            </div>

            <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 15px;">
                <button type="button" id="btnCerrarModal" class="btn-danger" style="padding: 8px 20px;">Cancelar</button>
                <button type="submit" class="btn-success" style="padding: 8px 20px;">Guardar</button>
            </div>
        </form>
    </div>
</div>
                            </form>
                        </div>
                    </div>

                    <div style="text-align: center; margin-top: 20px;">
                        <button class="btn-danger hidden" id="btn-delete-servicio"><i class="fa-solid fa-trash"></i> Eliminar Servicio</button>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- MODAL ESTADO -->
    <div id="status-modal" class="modal-overlay hidden">
        <div class="modal-box">
            <div id="modal-icon-bg" style="width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px;">
                <i id="modal-icon" style="font-size: 35px; color: white;"></i>
            </div>
            <h3 id="modal-title">MENSAJE</h3>
            <p id="modal-message" style="margin-top: 10px;"></p>
            <button id="modal-close-btn" class="btn-primary" style="margin-top: 20px;">Aceptar</button>
        </div>
    </div>

    <!-- MODAL CONFIRMAR ELIMINACIÓN -->
    <div id="confirm-delete-modal" class="modal-overlay hidden">
        <div class="modal-box">
            <h3>¿ELIMINAR SERVICIO?</h3>
            <p style="margin: 15px 0;">Esta acción no se puede deshacer.</p>
            <div style="display: flex; gap: 15px; justify-content: center;">
                <button id="btn-cancel-delete" class="btn-primary">Cancelar</button>
                <button id="btn-confirm-delete" class="btn-danger">Eliminar</button>
            </div>
        </div>
    </div>

    <script src="js/servicios.js"></script>
</body>
</html>
